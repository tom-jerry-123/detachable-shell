# native.tmux.conf — tmux as a PURE persistence layer (terminal-session-spec R1-R5).
# Load ONLY on the private socket:  tmux -L jerryspec -f native.tmux.conf ...
# NEVER load this into the default tmux server (the user's 5 live sessions
# run there with their own config).
#
# Verified against tmux 3.4 (Ubuntu). Pair with ./dsh-tmux, the attach wrapper
# that replays pre-attach history into the terminal's native scrollback (R4).

# ---- R2: tmux must never own a keystroke or redraw modally ----------------
set -g prefix None                 # tmux 3.4 supports the special key 'None'
set -g prefix2 None
unbind-key -a                      # zero key/mouse bindings, incl. root table
set -g mouse off                   # terminal owns wheel + selection (R3/R4)
set -s escape-time 10              # don't sit on Esc (TUIs feel native)

# Deliberate R2 exception (user-requested): ONE captured key for detach,
# Ctrl-q — same as the shpool branch, so detach is uniform everywhere.
# (A single control byte: nothing for the desktop/IDE to intercept, unlike
# function keys, and raw mode disables its legacy XON meaning while attached.)
# Ctrl-q never reaches inner programs; every other key still passes through.
bind-key -n C-q detach-client

# ---- R3/R4: stay on the outer terminal's NORMAL screen ---------------------
# Strip the alternate-screen capabilities from EVERY outer terminal type, so
# tmux never emits \e[?1049h / \e[?47h (verified byte-for-byte on 3.4:
# attach emits no 1049/47/1047 and only mouse-DISABLE sequences).
set -as terminal-overrides ',*:smcup@:rmcup@'

# ---- history the wrapper can replay ----------------------------------------
# Applies to panes created after this is set, i.e. all sessions made by dsh-tmux.
set -g history-limit 100000

# ---- invisibility -----------------------------------------------------------
set -g status off                  # no status bar: tmux is visually absent
set -g set-titles on               # tab title = in-session indicator:
set -g set-titles-string '[tmux:#S] #{pane_title}'
# NOTE: do NOT re-enable the status bar for an indicator. With a status line,
# tmux scrolls panes inside a margin region, and terminals DISCARD lines
# scrolled out of a region instead of adding them to scrollback — it would
# silently break R4 native scrolling.

# ---- plumbing ---------------------------------------------------------------
set -g default-terminal 'tmux-256color'    # inner TERM (terminfo ships on Ubuntu)
set -g focus-events on             # pass focus in/out through to inner TUIs
set -g window-size latest          # pane tracks the most recent client's size
set -g detach-on-destroy on
set -g exit-empty on
